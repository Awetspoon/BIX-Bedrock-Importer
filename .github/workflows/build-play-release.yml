name: Build Play Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Restore upload keystore
        env:
          BIX_KEYSTORE_BASE64: ${{ secrets.BIX_KEYSTORE_BASE64 }}
        run: |
          test -n "$BIX_KEYSTORE_BASE64"
          printf '%s' "$BIX_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/bix-upload.jks"

      - name: Test, lint, and build signed App Bundle
        env:
          BIX_STORE_FILE: ${{ runner.temp }}/bix-upload.jks
          BIX_STORE_PASSWORD: ${{ secrets.BIX_STORE_PASSWORD }}
          BIX_KEY_ALIAS: ${{ secrets.BIX_KEY_ALIAS }}
          BIX_KEY_PASSWORD: ${{ secrets.BIX_KEY_PASSWORD }}
        run: gradle testDebugUnitTest lintRelease bundleRelease

      - name: Rename App Bundle
        run: cp app/build/outputs/bundle/release/app-release.aab BIX.aab

      - name: Upload Play artifact
        uses: actions/upload-artifact@v4
        with:
          name: BIX-play-release
          path: BIX.aab
